pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,js}'
      exclude: 'dist|node_modules|coverage'
      run: pnpm exec oxlint --type-aware --fix --deny-warnings {staged_files}
      stage_fixed: true
    fmt:
      glob: '*.{ts,js,json}'
      exclude: 'dist|node_modules|coverage|pnpm-lock.yaml'
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
